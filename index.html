<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Neurodynamics · Controle de Documentos</title>
<style>
  :root{
    --ink:#0f172a; --indigo:#4f46e5; --indigo7:#4338ca; --cyan:#0891b2;
    --s50:#f8fafc; --s100:#f1f5f9; --s200:#e2e8f0; --s300:#cbd5e1; --s400:#94a3b8;
    --s500:#64748b; --s600:#475569; --s700:#334155; --s800:#1e293b;
    --emerald:#10b981; --emerald7:#047857; --amber:#f59e0b; --amber7:#b45309;
    --rose:#e11d48; --rose50:#fff1f2; --rose7:#be123c;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--s50);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer}
  .mono{font-family:var(--mono)}
  .wrap{max-width:1400px;margin:0 auto;padding:0 20px}

  header{background:#fff;border-bottom:1px solid var(--s200)}
  .hbar{display:flex;flex-wrap:wrap;align-items:center;gap:16px;padding:12px 0}
  .brand{display:flex;align-items:center;gap:10px}
  .logo{width:32px;height:32px;border-radius:7px;background:var(--ink);color:#fff;display:grid;place-items:center}
  .brand b{font-size:13px;font-weight:600;letter-spacing:-.01em;display:block}
  .brand span{font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:var(--s400)}
  .tabs{display:flex;gap:2px;background:var(--s100);padding:3px;border-radius:9px}
  .tab{display:flex;align-items:center;gap:6px;border:0;background:transparent;color:var(--s500);
       font-weight:500;font-size:13px;padding:7px 13px;border-radius:6px}
  .tab.active{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.06)}
  .role{margin-left:auto;display:flex;align-items:center;gap:8px}
  .role label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--s400)}
  select{font-family:inherit;font-size:13px;font-weight:500;color:var(--s700);background:#fff;
         border:1px solid var(--s300);border-radius:7px;padding:7px 9px}
  select:focus{outline:2px solid var(--indigo);outline-offset:1px}

  main{padding:26px 0}
  h1{font-size:22px;font-weight:600;letter-spacing:-.02em;margin:0}
  .sub{color:var(--s500);font-size:13px;margin:4px 0 20px;max-width:640px}
  .cols{display:grid;gap:24px;grid-template-columns:1fr 388px}
  @media(max-width:980px){.cols{grid-template-columns:1fr}}

  .card{background:#fff;border:1px solid var(--s200);border-radius:12px}
  .empty{border:1px dashed var(--s300);border-radius:12px;background:#fff;padding:32px;text-align:center;color:var(--s500)}
  .empty svg{color:var(--s300);margin-bottom:8px}

  .sector{padding:16px;margin-bottom:16px}
  .sector .shead{display:flex;align-items:baseline;gap:8px;margin-bottom:12px;flex-wrap:wrap}
  .badge{background:var(--ink);color:#fff;font-family:var(--mono);font-size:11px;font-weight:600;padding:2px 6px;border-radius:6px}
  .sname{font-size:14px;font-weight:600}
  .sdesc{font-size:12px;color:var(--s400)}
  .nodes{display:grid;gap:8px;grid-template-columns:repeat(3,1fr)}
  @media(max-width:560px){.nodes{grid-template-columns:repeat(2,1fr)}}
  .node{border:1px solid var(--s200);border-radius:9px;padding:10px;text-align:left;background:#fff;transition:.12s}
  .node:hover{border-color:var(--s300);background:var(--s50)}
  .node.sel{border-color:var(--indigo);background:#eef2ff;box-shadow:0 0 0 1px var(--indigo)}
  .node.dim{opacity:.35}
  .node .ntop{display:flex;align-items:center;justify-content:space-between}
  .node .ncode{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--s500)}
  .node .nname{font-size:12px;font-weight:500;color:var(--s800);margin-top:4px;line-height:1.3;
               display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .dot{width:7px;height:7px;border-radius:50%}
  .empty-lane{border:1px dashed var(--s200);border-radius:8px;padding:14px;text-align:center;color:var(--s400);font-size:12px}

  .dossie{padding:20px}
  .dcode{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--indigo)}
  .dname{font-size:16px;font-weight:600;line-height:1.3;margin:2px 0 0}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;
        padding:2px 7px;border-radius:6px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.06)}
  .chip.sm{font-size:10px}
  .chip svg{width:11px;height:11px}
  .obj{font-size:13px;color:var(--s600);margin-top:12px;line-height:1.55}
  .btn{display:flex;width:100%;align-items:center;justify-content:center;gap:7px;border-radius:9px;
       font-size:13px;font-weight:500;padding:9px;border:1px solid var(--s300);background:#fff;color:var(--s700);margin-top:12px}
  .btn:hover{background:var(--s50)}
  .btn[disabled]{cursor:not-allowed;color:var(--s300);border-color:var(--s200);background:var(--s50)}
  .btn.indigo{background:var(--indigo);border-color:var(--indigo);color:#fff}
  .btn.indigo:hover{background:var(--indigo7)}
  .btn.emerald{background:var(--emerald);border-color:var(--emerald);color:#fff}
  .btn.emerald:hover{background:var(--emerald7)}
  .btn[disabled].indigo,.btn[disabled].emerald{background:var(--s50);border-color:var(--s200);color:var(--s300)}
  .hint{font-size:11px;color:var(--s400);margin:4px 0 0 2px}

  .relgrp{margin-top:16px}
  .relgrp h4{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;text-transform:uppercase;
             letter-spacing:.06em;color:var(--s400);margin:0 0 6px}
  .relgrp .gd{width:8px;height:8px;border-radius:50%}
  .rrow{display:flex;align-items:center;gap:8px;border:1px solid var(--s200);border-radius:7px;padding:7px 9px;margin-top:4px;background:#fff;width:100%;text-align:left}
  .rrow:hover{border-color:var(--s300);background:var(--s50)}
  .rrow .rc{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--s500)}
  .rrow .rn{font-size:12px;color:var(--s700);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .rrow .ra{margin-left:auto;color:var(--s300);flex-shrink:0}

  .search{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--s300);border-radius:9px;padding:9px 12px;margin-bottom:12px}
  .search:focus-within{outline:2px solid var(--indigo);outline-offset:1px}
  .search input{flex:1;border:0;outline:0;font-size:14px;background:transparent}
  .filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
  .filters select{font-size:12px;padding:6px 9px}
  .count{font-size:12px;color:var(--s400);margin-bottom:8px}
  .list{overflow:hidden}
  .lrow{display:flex;align-items:center;gap:12px;width:100%;text-align:left;border:0;background:#fff;padding:10px 12px;border-top:1px solid var(--s100)}
  .lrow:first-child{border-top:0}
  .lrow:hover{background:var(--s50)}
  .lrow.sel{background:#eef2ff}
  .lrow .lc{width:108px;flex-shrink:0;font-family:var(--mono);font-size:12px;font-weight:600;color:var(--s500)}
  .lrow .ln{flex:1;font-size:13px;font-weight:500;color:var(--s800);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lrow .lcl{width:84px;flex-shrink:0}
  .lrow .lar{color:var(--s300);flex-shrink:0}
  @media(max-width:560px){.lrow .lcl{display:none}}

  dl.meta{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px;padding:20px;margin:0;border-bottom:1px solid var(--s100)}
  dl.meta dt{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--s400)}
  dl.meta dd{margin:2px 0 0;font-size:12px;font-weight:500;color:var(--s700)}
  .actions{display:grid;gap:8px;padding:20px;border-bottom:1px solid var(--s100)}
  .rev{padding:20px}
  .rev h4{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--s400);margin:0 0 14px}
  .timeline{list-style:none;margin:0;padding:0 0 0 16px;border-left:1px solid var(--s200)}
  .timeline li{position:relative;margin-bottom:14px}
  .timeline li:last-child{margin-bottom:0}
  .tdot{position:absolute;left:-21px;top:2px;width:14px;height:14px;border-radius:50%;background:#fff;
        box-shadow:0 0 0 2px var(--indigo);display:grid;place-items:center}
  .tdot span{width:6px;height:6px;border-radius:50%;background:var(--indigo)}
  .trev{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--s700)}
  .tdate{font-size:11px;color:var(--s400);margin-left:8px}
  .tlog{font-size:12px;color:var(--s600)}
  .restrict{border:1px solid #fecdd3;background:rgba(255,241,242,.5);border-radius:12px;padding:24px;text-align:center}
  .restrict svg{color:var(--rose);margin-bottom:8px}

  .ico{display:inline-flex;flex-shrink:0}
  .sticky{position:sticky;top:24px;align-self:start}
  footer{color:var(--s400);font-size:11px;padding:8px 0 40px;line-height:1.6}
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div id="app"></div>
<script src="data.js"></script>
<script>
(function(){
  const DATA = window.NEURO_DATA;
  if(!DATA){ document.getElementById('app').innerHTML =
    '<div style="padding:40px;text-align:center;color:#64748b">Não foi possível carregar data.js. '+
    'Sirva os arquivos por HTTP (GitHub Pages ou <code>python -m http.server</code>).</div>'; return; }

  const DOCS = DATA.documentos, REL = DATA.relacoes, SET = DATA.setores;
  const byCode = Object.fromEntries(DOCS.map(d=>[d.code,d]));
  const setorOf = c => c.split('-')[1];
  const SECTORS = Object.keys(SET);

  const I = {
    net:'<path d="M12 3v6m0 6v6M5.6 7.5 9 9m6 6 3.4 1.5M18.4 7.5 15 9m-6 6-3.4 1.5"/><circle cx="12" cy="12" r="2.2"/><circle cx="12" cy="4" r="1.6"/><circle cx="12" cy="20" r="1.6"/><circle cx="4.5" cy="7" r="1.6"/><circle cx="19.5" cy="7" r="1.6"/><circle cx="4.5" cy="17" r="1.6"/><circle cx="19.5" cy="17" r="1.6"/>',
    layers:'<path d="m12 2 9 5-9 5-9-5 9-5Z"/><path d="m3 12 9 5 9-5M3 17l9 5 9-5"/>',
    clip:'<rect x="8" y="3" width="8" height="4" rx="1"/><path d="M8 5H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>',
    search:'<circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/>',
    file:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/>',
    lock:'<rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/>',
    shield:'<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/>',
    eye:'<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/>',
    up:'<path d="M12 19V6M5 12l7-7 7 7"/>',
    check:'<path d="M20 6 9 17l-5-5"/>',
    arrow:'<path d="M5 12h14M13 6l6 6-6 6"/>',
    branch:'<circle cx="6" cy="6" r="2.5"/><circle cx="6" cy="18" r="2.5"/><circle cx="18" cy="8" r="2.5"/><path d="M6 8.5v7M18 10.5c0 4-6 1-6 5"/>',
    x:'<path d="M18 6 6 18M6 6l12 12"/>',
    chev:'<path d="m9 18 6-6-6-6"/>',
  };
  const svg=(p,s)=>`<span class="ico"><svg width="${s||16}" height="${s||16}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${p}</svg></span>`;
  const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));

  const STATUS={
    'EM VIGÊNCIA':{dot:'var(--emerald)',bg:'#ecfdf5',fg:'var(--emerald7)'},
    'RASCUNHO':{dot:'var(--amber)',bg:'#fffbeb',fg:'var(--amber7)'},
    'INEXISTENTE':{dot:'var(--s300)',bg:'var(--s100)',fg:'var(--s500)'},
  };
  const CLASSE={
    'PÚBLICO':{bg:'var(--s100)',fg:'var(--s600)',icon:null},
    'CONTROLADO':{bg:'#eef2ff',fg:'var(--indigo7)',icon:I.shield},
    'CONFIDENCIAL':{bg:'var(--rose50)',fg:'var(--rose7)',icon:I.lock},
  };
  const stChip=s=>{const t=STATUS[s]||STATUS['INEXISTENTE'];return `<span class="chip" style="background:${t.bg};color:${t.fg}">${esc(s)}</span>`};
  const clChip=(c,sm)=>{const t=CLASSE[c]||CLASSE['PÚBLICO'];return `<span class="chip${sm?' sm':''}" style="background:${t.bg};color:${t.fg}">${t.icon?svg(t.icon,sm?10:12):''}${esc(sm?c.slice(0,4):c)}</span>`};
  const REL_C={alimenta:'var(--indigo)',deriva:'var(--cyan)',ref:'var(--s400)'};

  const GRUPOS={
    visitante:{nome:'Visitante',clear:['PÚBLICO'],submeter:false,aprovar:false,soVigente:true},
    membro:{nome:'Membro',clear:['PÚBLICO','CONTROLADO'],submeter:true,aprovar:false,soVigente:false},
    revisor:{nome:'Revisor',clear:['PÚBLICO','CONTROLADO'],submeter:true,aprovar:false,soVigente:false},
    aprovador:{nome:'Aprovador / Diretoria',clear:['PÚBLICO','CONTROLADO','CONFIDENCIAL'],submeter:true,aprovar:true,soVigente:false},
  };
  const podeVer=(d,g)=>g.clear.includes(d.classe)&&(!g.soVigente||d.status==='EM VIGÊNCIA');

  function relacoesDe(code){
    const alimenta=REL.filter(e=>e.de===code&&e.tipo==='ALIMENTA').map(e=>e.para);
    const deriva  =REL.filter(e=>e.para===code&&e.tipo==='ALIMENTA').map(e=>e.de);
    const ref     =REL.filter(e=>e.tipo==='REFERENCIA'&&(e.de===code||e.para===code)).map(e=>e.de===code?e.para:e.de);
    return {alimenta,deriva,ref};
  }
  function conectados(code){
    const s=new Set([code]); REL.forEach(e=>{if(e.de===code)s.add(e.para);if(e.para===code)s.add(e.de)}); return s;
  }

  const st={tab:'mapa',role:'membro',sel:null,q:'',fSetor:'TODOS',fStatus:'TODOS',fClasse:'TODOS'};
  const $=s=>document.querySelector(s);

  function shell(){
    document.getElementById('app').innerHTML=`
    <header><div class="wrap hbar">
      <div class="brand"><div class="logo">${svg(I.net,17)}</div>
        <div><b>NEURODYNAMICS</b><span>Controle de Documentos</span></div></div>
      <nav class="tabs">
        <button class="tab" data-tab="mapa">${svg(I.layers,15)} Mapa de Rastreabilidade</button>
        <button class="tab" data-tab="plm">${svg(I.clip,15)} Repositório PLM</button>
      </nav>
      <div class="role"><label>Logado como</label>
        <select id="role">${Object.entries(GRUPOS).map(([k,v])=>`<option value="${k}">${v.nome}</option>`).join('')}</select>
      </div>
    </div></header>
    <main class="wrap"><div id="view"></div></main>
    <footer class="wrap">Protótipo · dados do NRO-PUB-001 · objetivos e relações inferidos (revisar na planilha de metadados).
      As permissões aqui são <b>demonstrativas</b> — a aplicação real ocorre via GitHub Teams / CODEOWNERS e no Drive.</footer>`;
    $('#role').value=st.role;
    $('#role').onchange=e=>{st.role=e.target.value;view()};
    document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{st.tab=b.dataset.tab;st.sel=null;view()});
    view();
  }
  function syncTabs(){document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===st.tab))}
  function view(){syncTabs(); st.tab==='mapa'?renderMapa():renderPLM()}

  function renderMapa(){
    $('#view').innerHTML=`
      <div class="cols"><div>
        <h1>Mapa de rastreabilidade</h1>
        <p class="sub">Os tipos de documento por setor e como se amarram. Clique num documento para ver objetivo, template e as ligações
          <b style="color:var(--indigo)">alimenta</b> / <b style="color:var(--cyan)">deriva de</b> / <b style="color:var(--s500)">referencia</b>.</p>
        <div id="lanes"></div>
      </div>
      <aside class="sticky"><div id="reldetail"></div></aside></div>`;
    renderLanes(); renderRelDetail();
  }
  function renderLanes(){
    const conn = st.sel?conectados(st.sel):null;
    $('#lanes').innerHTML=SECTORS.map(s=>{
      const docs=DOCS.filter(d=>setorOf(d.code)===s);
      const inner = docs.length===0
        ? `<div class="empty-lane">Sem documentos cadastrados</div>`
        : `<div class="nodes">`+docs.map(d=>{
            const dim=conn&&!conn.has(d.code);
            const t=STATUS[d.status]||STATUS['INEXISTENTE'];
            return `<button class="node ${st.sel===d.code?'sel':''} ${dim?'dim':''}" data-code="${d.code}">
              <div class="ntop"><span class="ncode">${d.code}</span><span class="dot" style="background:${t.dot}" title="${esc(d.status)}"></span></div>
              <div class="nname">${esc(d.nome)}</div></button>`;
          }).join('')+`</div>`;
      return `<section class="card sector"><div class="shead">
        <span class="badge">NRO-${s}</span><span class="sname">${esc(SET[s].nome)}</span>
        <span class="sdesc">${esc(SET[s].desc||'')}</span></div>${inner}</section>`;
    }).join('');
    document.querySelectorAll('#lanes .node').forEach(n=>n.onclick=()=>{st.sel=n.dataset.code;renderLanes();renderRelDetail()});
  }
  function relGroup(title,color,codes){
    if(!codes.length)return '';
    return `<div class="relgrp"><h4><span class="gd" style="background:${color}"></span>${title}</h4>`+
      codes.map(c=>{const d=byCode[c];if(!d)return '';
        return `<button class="rrow" data-code="${c}"><span class="rc">${c}</span><span class="rn">${esc(d.nome)}</span><span class="ra">${svg(I.arrow,13)}</span></button>`;
      }).join('')+`</div>`;
  }
  function renderRelDetail(){
    const box=$('#reldetail'); if(!box)return;
    if(!st.sel){box.innerHTML=`<div class="empty">${svg(I.net,28)}<p>Selecione um documento para ver suas relações.</p></div>`;return}
    const d=byCode[st.sel], r=relacoesDe(st.sel);
    const tmpl=d.template_url
      ? `<a class="btn" href="${esc(d.template_url)}" target="_blank" rel="noopener">${svg(I.file,14)} Abrir arquivo no Drive</a>`
      : `<button class="btn" disabled>${svg(I.file,14)} Link do arquivo pendente</button>`;
    box.innerHTML=`<div class="card dossie">
      <span class="dcode">${d.code}</span><h2 class="dname">${esc(d.nome)}</h2>
      <div class="chips">${stChip(d.status)}${clChip(d.classe)}<span class="chip" style="background:var(--s100);color:var(--s600)">${esc(d.subtipo)}</span></div>
      <p class="obj">${esc(d.objetivo)}</p>${tmpl}
      ${relGroup('Alimenta',REL_C.alimenta,r.alimenta)}
      ${relGroup('Deriva de',REL_C.deriva,r.deriva)}
      ${relGroup('Referencia',REL_C.ref,r.ref)}</div>`;
    box.querySelectorAll('.rrow').forEach(b=>b.onclick=()=>{st.sel=b.dataset.code;renderLanes();renderRelDetail();box.scrollIntoView({behavior:'smooth',block:'nearest'})});
  }

  function renderPLM(){
    $('#view').innerHTML=`
      <div class="cols"><div>
        <h1>Repositório PLM</h1>
        <p class="sub">Busque por código, nome, pessoa, projeto ou área.</p>
        <div class="search">${svg(I.search,16)}<input id="q" placeholder="USRS, MMARCONDES, NRO-PRO…" value="${esc(st.q)}"><button id="qx" style="border:0;background:0;color:var(--s400)">${svg(I.x,15)}</button></div>
        <div class="filters">
          ${selFilter('fSetor','Setor',['TODOS',...SECTORS],s=>s==='TODOS'?'Setor: todos':`NRO-${s} · ${SET[s].nome}`)}
          ${selFilter('fStatus','Status',['TODOS','EM VIGÊNCIA','RASCUNHO','INEXISTENTE'])}
          ${selFilter('fClasse','Classe',['TODOS','PÚBLICO','CONTROLADO','CONFIDENCIAL'])}
        </div>
        <div class="count" id="count"></div>
        <div class="card list" id="list"></div>
      </div>
      <aside class="sticky"><div id="detail"></div></aside></div>`;
    const q=$('#q');
    q.oninput=e=>{st.q=e.target.value;renderList()};
    $('#qx').onclick=()=>{st.q='';q.value='';q.focus();renderList()};
    ['fSetor','fStatus','fClasse'].forEach(id=>$('#'+id).onchange=e=>{st[id]=e.target.value;renderList()});
    renderList(); renderDetail();
  }
  function selFilter(id,label,opts,fmt){
    return `<select id="${id}">`+opts.map(o=>`<option value="${esc(o)}" ${st[id]===o?'selected':''}>${esc(o==='TODOS'?label+': todos':(fmt?fmt(o):o))}</option>`).join('')+`</select>`;
  }
  function filtered(){
    const term=st.q.trim().toLowerCase();
    return DOCS.filter(d=>{
      if(st.fSetor!=='TODOS'&&setorOf(d.code)!==st.fSetor)return false;
      if(st.fStatus!=='TODOS'&&d.status!==st.fStatus)return false;
      if(st.fClasse!=='TODOS'&&d.classe!==st.fClasse)return false;
      if(!term)return true;
      return [d.code,d.nome,d.autor,d.revisor,d.subtipo,d.projeto].filter(Boolean).join(' ').toLowerCase().includes(term);
    });
  }
  function renderList(){
    const g=GRUPOS[st.role], rows=filtered();
    $('#count').textContent=`${rows.length} de ${DOCS.length} documentos`;
    $('#list').innerHTML = rows.length? rows.map(d=>{
      const t=STATUS[d.status]||STATUS['INEXISTENTE'];
      return `<button class="lrow ${st.sel===d.code?'sel':''}" data-code="${d.code}">
        <span class="dot" style="background:${t.dot}" title="${esc(d.status)}"></span>
        <span class="lc">${d.code}</span><span class="ln">${esc(d.nome)}</span>
        <span class="lcl">${clChip(d.classe,true)}</span>
        ${podeVer(d,g)?'':`<span class="ico" style="color:var(--rose)" title="Acesso restrito">${svg(I.lock,13)}</span>`}
        <span class="lar">${svg(I.chev,15)}</span></button>`;
    }).join('') : `<div style="padding:40px;text-align:center;color:var(--s400)">Nenhum documento corresponde aos filtros.</div>`;
    document.querySelectorAll('#list .lrow').forEach(b=>b.onclick=()=>{st.sel=b.dataset.code;renderList();renderDetail()});
  }
  function actionBtn(icon,label,enabled,cls,hint){
    return `<div><button class="btn ${cls}" ${enabled?'':'disabled'}>${svg(icon,15)} ${label}</button>${hint?`<div class="hint">${esc(hint)}</div>`:''}</div>`;
  }
  function renderDetail(){
    const box=$('#detail'); if(!box)return;
    if(!st.sel){box.innerHTML=`<div class="empty">${svg(I.file,28)}<p>Selecione um documento para abrir o dossiê.</p></div>`;return}
    const d=byCode[st.sel], g=GRUPOS[st.role];
    if(!podeVer(d,g)){
      box.innerHTML=`<div class="restrict">${svg(I.lock,26)}<div class="dcode" style="color:var(--rose7)">${d.code}</div>
        <h2 class="dname" style="font-size:15px">${esc(d.nome)}</h2>
        <p style="color:var(--rose7);font-size:13px;margin-top:8px">Acesso restrito. Classe <b>${esc(d.classe)}</b> indisponível para o grupo <b>${esc(g.nome)}</b>.</p></div>`;
      return;
    }
    const revs=[];
    if(d.autor)revs.push({rev:'A',resp:d.autor,data:d.data_autor,log:'Criação do documento.'});
    if(d.revisor)revs.push({rev:'B',resp:d.revisor,data:d.data_rev,log:'Revisão.'});
    const tl=revs.slice().reverse().map(r=>`<li><span class="tdot"><span></span></span>
      <div><span class="trev">Rev. ${r.rev}</span><span class="tdate">${esc(r.data||'')}</span></div>
      <div class="tlog">${esc(r.log)} <span style="color:var(--s400)">· ${esc(r.resp)}</span></div></li>`).join('');
    const open=d.template_url
      ? `<div><a class="btn" href="${esc(d.template_url)}" target="_blank" rel="noopener">${svg(I.eye,15)} Abrir / baixar versão atual</a></div>`
      : actionBtn(I.eye,'Abrir / baixar versão atual',false,'',`Link do arquivo no Drive pendente`);
    box.innerHTML=`<div class="card">
      <div style="padding:20px;border-bottom:1px solid var(--s100)">
        <div style="display:flex;justify-content:space-between;gap:8px">
          <div><span class="dcode">${d.code}</span><h2 class="dname">${esc(d.nome)}</h2></div>
          <button id="dclose" style="border:0;background:0;color:var(--s300)">${svg(I.x,16)}</button></div>
        <div class="chips">${stChip(d.status)}${clChip(d.classe)}${d.projeto?`<span class="chip" style="background:var(--s100);color:var(--s600)">${esc(d.projeto)}</span>`:''}</div>
      </div>
      <dl class="meta">
        <div><dt>Tipo</dt><dd>${esc(d.tipo||'—')}</dd></div>
        <div><dt>Subtipo</dt><dd>${esc(d.subtipo||'—')}</dd></div>
        <div><dt>Autor</dt><dd>${esc(d.autor||'—')}</dd></div>
        <div><dt>Revisor</dt><dd>${esc(d.revisor||'—')}</dd></div>
        <div><dt>Última edição</dt><dd>${esc(d.data_rev||d.data_autor||'—')}</dd></div>
        <div><dt>Relações</dt><dd>${REL.filter(e=>e.de===d.code||e.para===d.code).length} ligação(ões)</dd></div>
      </dl>
      <div class="actions">
        ${open}
        ${actionBtn(I.up,'Submeter nova versão para aprovação',g.submeter,'indigo',g.submeter?'Abre um Pull Request':'Seu grupo não pode submeter')}
        ${actionBtn(I.check,'Aprovar e publicar como versão vigente',g.aprovar,'emerald',g.aprovar?'Faz o merge e atualiza a Rev.':'Requer grupo Aprovador')}
      </div>
      <div class="rev"><h4>${svg(I.branch,13)} Histórico de revisões</h4>
        ${revs.length?`<ol class="timeline">${tl}</ol>`:`<p style="color:var(--s400);font-size:12px">Sem revisões registradas.</p>`}</div>
    </div>`;
    $('#dclose').onclick=()=>{st.sel=null;renderList();renderDetail()};
  }

  shell();
})();
</script>
</body>
</html>
