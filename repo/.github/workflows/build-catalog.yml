name: Atualizar e publicar catálogo

# Regenera o docs/data.js a partir das planilhas e publica APENAS a pasta
# docs/ (só metadados) no GitHub Pages. Os arquivos dos setores NÃO são
# publicados — permanecem acessíveis somente dentro do repositório (privado).

on:
  push:
    branches: [main]
    paths:
      - 'controle/**'
      - 'docs/**'
      - '.github/workflows/build-catalog.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install openpyxl

      - name: Gerar data.js
        run: python controle/build_data.py

      - uses: actions/configure-pages@v5

      - name: Empacotar apenas o catálogo (metadados)
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v4

# Pré-requisitos:
#  - Settings → Pages → Source: "GitHub Actions"
#  - Plano sem Enterprise => o site publicado é PÚBLICO (apenas metadados aqui).
